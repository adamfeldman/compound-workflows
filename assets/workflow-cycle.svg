<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse" fill="#64748b">
      <path d="M 0 0 L 10 5 L 0 10 z"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse" fill="#8b5cf6">
      <path d="M 0 0 L 10 5 L 0 10 z"/>
    </marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse" fill="#a16207">
      <path d="M 0 0 L 10 5 L 0 10 z"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="420" rx="16" fill="#fafafa"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" font-size="15" font-weight="600" fill="#334155" letter-spacing="0.5">THE COMPOUND WORKFLOW CYCLE</text>

  <!-- Arrows (drawn behind nodes) -->

  <!-- brainstorm → plan: arc from brainstorm top-right to plan left -->
  <path d="M 192 118 C 230 78, 265 66, 286 74" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- plan → work: gentle inward arc from plan bottom to work top-left -->
  <path d="M 380 110 C 400 160, 460 195, 498 220" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- work → review: arc to review right edge -->
  <path d="M 510 276 C 485 310, 440 338, 405 345" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- review → compound: approach compound right edge horizontally -->
  <path d="M 272 336 C 240 325, 215 300, 200 278" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- compound → brainstorm: short upward arc on left side -->
  <path d="M 118 248 C 108 225, 104 200, 114 170" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrow-accent)"/>

  <!-- plan → deepen-plan: stop before node edge -->
  <path d="M 422 78 L 504 78" fill="none" stroke="#a16207" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arrow-gold)"/>

  <!-- deepen-plan → plan: stop before node edge -->
  <path d="M 508 98 L 426 98" fill="none" stroke="#a16207" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arrow-gold)"/>

  <!-- Labels -->
  <text x="35" y="200" font-size="8" fill="#8b5cf6" font-style="italic">feeds future</text>
  <text x="35" y="210" font-size="8" fill="#8b5cf6" font-style="italic">sessions</text>

  <text x="465" y="68" text-anchor="middle" font-size="8" fill="#a16207" font-style="italic">optional</text>

  <!-- Nodes (drawn on top of arrows) -->

  <!-- brainstorm -->
  <g filter="url(#shadow)">
    <rect x="65" y="110" width="130" height="52" rx="26" fill="#f0f9ff" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="130" y="133" text-anchor="middle" font-size="11" fill="#0284c7" font-weight="600">💡 brainstorm</text>
    <text x="130" y="149" text-anchor="middle" font-size="9" fill="#64748b">explore ideas</text>
  </g>

  <!-- plan -->
  <g filter="url(#shadow)">
    <rect x="290" y="58" width="130" height="52" rx="26" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5"/>
    <text x="355" y="81" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="600">📋 plan</text>
    <text x="355" y="97" text-anchor="middle" font-size="9" fill="#64748b">design solution</text>
  </g>

  <!-- deepen-plan -->
  <g filter="url(#shadow)">
    <rect x="510" y="58" width="145" height="52" rx="26" fill="#fefce8" stroke="#facc15" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="582" y="81" text-anchor="middle" font-size="11" fill="#a16207" font-weight="600">🔍 deepen-plan</text>
    <text x="582" y="97" text-anchor="middle" font-size="9" fill="#64748b">research + red team</text>
  </g>

  <!-- work -->
  <g filter="url(#shadow)">
    <rect x="490" y="224" width="130" height="52" rx="26" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
    <text x="555" y="247" text-anchor="middle" font-size="11" fill="#c2410c" font-weight="600">⚡ work</text>
    <text x="555" y="263" text-anchor="middle" font-size="9" fill="#64748b">build with agents</text>
  </g>

  <!-- review -->
  <g filter="url(#shadow)">
    <rect x="270" y="322" width="130" height="52" rx="26" fill="#fdf2f8" stroke="#f472b6" stroke-width="1.5"/>
    <text x="335" y="345" text-anchor="middle" font-size="11" fill="#be185d" font-weight="600">🔎 review</text>
    <text x="335" y="361" text-anchor="middle" font-size="9" fill="#64748b">multi-agent review</text>
  </g>

  <!-- compound -->
  <g filter="url(#shadow)">
    <rect x="65" y="248" width="130" height="52" rx="26" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="130" y="271" text-anchor="middle" font-size="11" fill="#7c3aed" font-weight="600">📚 compound</text>
    <text x="130" y="287" text-anchor="middle" font-size="9" fill="#64748b">capture knowledge</text>
  </g>
</svg>